# LavaMusic — bot only.
# Lavalink runs externally; add your public node URLs to NODES in .env.
#
# Usage:
#   docker compose up -d
#
# To use Postgres instead of the default SQLite/PGLite:
#   docker compose --profile postgres up -d
#   and set DATABASE_URL=postgresql://lavamusic:lavamusic@postgres:5432/lavamusic in .env

services:
  # --------------------------------
  # Postgres (optional)
  # --------------------------------
  postgres:
    profiles: [postgres]
    container_name: lavamusic-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lavamusic
      POSTGRES_PASSWORD: lavamusic
      POSTGRES_DB: lavamusic
    volumes:
      - ./lavamusic-postgres:/var/lib/postgresql/data
    healthcheck:
      test: "pg_isready -U lavamusic"
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lavamusic

  # --------------------------------
  # LavaMusic Bot
  # --------------------------------
  lavamusic:
    container_name: lavamusic
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./lavamusic-pgdata:/app/lavamusic-pgdata
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    networks:
      - lavamusic

networks:
  lavamusic:
    name: lavamusic
